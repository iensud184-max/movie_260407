{% extends 'base.html' %}

{% block title %}
    공지사항 - 필름아티크
{% endblock %}

{% block styles %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/question_list.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/notice_detail.css') }}">
{% endblock %}

{% block content %}

    <div class="header">
        <div class="container">
            <div class="menu">
                <h3 id="sub_title">고객센터</h3>
                <div class="service">

                    <ul class="nav nav-underline">
                        <li class="nav-item">
                            <a class="nav-link active" href="{{ url_for("cs.faq_list") }}">FAQ</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page"
                               href="{{ url_for("cs.notice_list") }}">공지사항</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="{{ url_for("cs.review_list") }}">1:1문의</a>
                        </li>

                    </ul>
                </div>
            </div>
        </div>
    </div>

    {% if review.image_path %}
        {% for path in review.image_path.split(',') %}
        <div class="my-3">
            <img src="{{ url_for('static', filename=path) }}" alt="첨부 이미지"
            style="max-width: 100%; height: auto;" class="img-thumbnail">
        </div>
        {% endfor %}
    {% endif %}
