<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>휴면회원 안내</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#fff;
    font-family:Arial, Helvetica, sans-serif;
}

/* =========================
   HEADER
========================= */
header{
    width:100%;
    background:#000;
    border-bottom:1px solid #222;
}

.headermain{
    width:1207px;
    margin:0 auto;
    padding:20px 0;
}

#logo{
    text-align:center;
}

#logo a{
    font-size:42px;
    color:#fff;
    text-decoration:none;
    font-weight:900;
    letter-spacing:2px;
}

/* =========================
   MAIN
========================= */
main{
    min-height:calc(100vh - 120px);
    background:
    linear-gradient(to bottom, rgba(0,0,0,0.65), rgba(0,0,0,0.9)),
    url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=1600&q=80');
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:60px 20px;
}

/* =========================
   CARD
========================= */
.sleep-wrap{
    width:100%;
    max-width:560px;
}

.sleep-card{
    background:rgba(20,20,20,0.92);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:50px 40px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

.icon{
    font-size:56px;
    margin-bottom:20px;
}

h1{
    font-size:34px;
    margin-bottom:18px;
    font-weight:800;
}

.desc{
    font-size:16px;
    color:#cfcfcf;
    line-height:1.8;
    margin-bottom:28px;
}

.info-box{
    background:#3f3f3f;
    border:1px solid #555;
    border-radius:12px;
    padding:18px;
    color:#eee;
    line-height:1.7;
    font-size:14px;
    margin-bottom:28px;
}

/* =========================
   BUTTON
========================= */
.btn-release{
    display:block;
    width:100%;
    padding:16px;
    border-radius:10px;
    background:#e50914;
    color:#fff;
    text-decoration:none;
    font-size:18px;
    font-weight:700;
    transition:0.25s;
}

.btn-release:hover{
    background:#b20710;
    transform:translateY(-2px);
}

.btn-logout{
    display:block;
    width:100%;
    padding:16px;
    border-radius:10px;
    background:#2b2b2b;
    color:#fff;
    text-decoration:none;
    font-size:17px;
    font-weight:700;
    margin-top:12px;
    transition:0.25s;
    border:1px solid #444;
}

.btn-logout:hover{
    background:#3b3b3b;
    transform:translateY(-2px);
}

.sub-text{
    margin-top:18px;
    font-size:13px;
    color:#888;
}

/* =========================
   RESPONSIVE
========================= */
@media(max-width:1280px){

    .headermain{
        width:95%;
    }
}

@media(max-width:768px){

    #logo a{
        font-size:32px;
    }

    .sleep-card{
        padding:35px 25px;
    }

    h1{
        font-size:28px;
    }

    .desc{
        font-size:15px;
    }

    .btn-release,
    .btn-logout{
        font-size:16px;
    }
}
</style>
</head>

<body>

<header>
    <div class="headermain">
        <div id="logo">
            <a href="{{ url_for('main.index') }}">Film Atique</a>
        </div>
    </div>
</header>

<main>

    <div class="sleep-wrap">
        <div class="sleep-card">

            <div class="icon">💤</div>

            <h1>휴면회원입니다</h1>

            <p class="desc">
                장기간 로그인 기록이 없어 계정이 보호를 위해<br>
                휴면 상태로 전환되었습니다.
            </p>

            <div class="info-box">
                아래 버튼을 누르면 즉시 휴면 상태가 해제되며<br>
                정상적으로 서비스를 이용하실 수 있습니다.
            </div>

            <a href="{{ url_for('auth.wake_member') }}" class="btn-release">
                휴면 해제 후 계속하기
            </a>

            <a href="{{ url_for('auth.logout') }}" class="btn-logout">
                로그아웃
            </a>

            <p class="sub-text">
                문제가 있을 경우 고객센터로 문의해주세요.
            </p>

        </div>
    </div>

</main>

</body>
</html>
